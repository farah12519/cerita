<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            user-select: none;
            touch-action: none;
        }

        .bg-full {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://user.uploads.dev/file/813fcebae0d6160ba788a6d4ce84d69a.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .swipe-container {
            width: 280px;
            height: 60px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            position: relative;
            padding: 5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .swipe-text {
            position: absolute;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 14px;
            font-weight: 500;
            pointer-events: none;
            left: 0;
            text-shadow: 
                -1px -1px 0 rgba(0,0,0,0.8),  
                 1px -1px 0 rgba(0,0,0,0.8),
                -1px  1px 0 rgba(0,0,0,0.8),
                 1px  1px 0 rgba(0,0,0,0.8);
            letter-spacing: 0.3px;
        }

        .swipe-handle {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            position: relative;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        #toast {
            visibility: hidden;
            min-width: 200px;
            background: rgba(255, 255, 255, 0.95);
            color: #000;
            text-align: center;
            border-radius: 50px;
            padding: 12px 24px;
            position: fixed;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            font-weight: 600;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.3s;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-end items-center">

    <div class="bg-full"></div>
    <div class="flex-grow"></div>

    <footer class="pb-20 flex justify-center w-full">
        <div class="swipe-container" id="track">
            <div class="swipe-text">Geser untuk Mulai Baca</div>
            <div id="handle" class="swipe-handle">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 18l6-6-6-6"/>
                </svg>
            </div>
        </div>
    </footer>

    <div id="toast">Membuka main/main.html...</div>

    <script>
        const handle = document.getElementById('handle');
        const track = document.getElementById('track');
        const toast = document.getElementById('toast');

        let isDragging = false;
        let startX = 0;
        
        const getMaxSlide = () => track.offsetWidth - handle.offsetWidth - 10;

        function onStart(e) {
            isDragging = true;
            startX = (e.type === 'touchstart') ? e.touches[0].clientX : e.clientX;
            handle.style.transition = 'none';
        }

        function onMove(e) {
            if (!isDragging) return;
            const currentX = (e.type === 'touchmove') ? e.touches[0].clientX : e.clientX;
            let deltaX = currentX - startX;
            const maxSlide = getMaxSlide();

            if (deltaX < 0) deltaX = 0;
            if (deltaX > maxSlide) deltaX = maxSlide;

            handle.style.transform = `translateX(${deltaX}px)`;

            if (deltaX >= maxSlide * 0.98) {
                completeAction();
            }
        }

        function onEnd() {
            if (!isDragging) return;
            isDragging = false;
            const maxSlide = getMaxSlide();
            const style = window.getComputedStyle(handle);
            const matrix = new WebKitCSSMatrix(style.transform);
            
            if (matrix.m41 < maxSlide * 0.98) {
                handle.style.transition = 'transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28)';
                handle.style.transform = 'translateX(0px)';
            }
        }

        function completeAction() {
            if (!isDragging) return;
            isDragging = false;
            
            handle.style.transform = `translateX(${getMaxSlide()}px)`;
            toast.classList.add("show");
            
            setTimeout(() => {
                // Menggunakan './' untuk memastikan pencarian folder dari lokasi file saat ini
               window.location.href = 'main.html';
            }, 600);
        }

        handle.addEventListener('mousedown', onStart);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onEnd);
        handle.addEventListener('touchstart', onStart, { passive: true });
        window.addEventListener('touchmove', onMove, { passive: false });
        window.addEventListener('touchend', onEnd);
    </script>
</body>
</html>
